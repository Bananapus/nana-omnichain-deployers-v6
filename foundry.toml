[profile.default]
solc = '0.8.26'
evm_version = 'cancun'
via_ir = true
optimizer_runs = 200
libs = ["node_modules", "lib"]
fs_permissions = [{ access = "read-write", path = "./"}]

[profile.ci_sizes]
optimizer_runs = 200

[fuzz]
runs = 4096

[invariant]
runs = 1024
depth = 100
fail_on_revert = false

# TODO: remove once @bananapus/core-v6 >=0.0.15 is installed (bare src/ imports in JBTest.sol)
[lint]
lint_on_build = false

[fmt]
number_underscore = "thousands"
multiline_func_header = "all"
wrap_comments = true

[rpc_endpoints]
ethereum = "${RPC_ETHEREUM_MAINNET}"
